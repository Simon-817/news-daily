<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <title>行业早报 - 2026-03-15</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 0;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .nav-date {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 500;
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .section {
            background: var(--bg-card);
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .section-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .section-title h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .section-title p {
            font-size: 13px;
            opacity: 0.9;
        }

        .section-body {
            padding: 8px 0;
        }

        .news-item {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .news-rank {
            width: 32px;
            height: 32px;
            min-width: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        .news-title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            padding-top: 4px;
        }

        .news-content {
            margin-left: 44px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .news-meta {
            margin-left: 44px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .news-source {
            font-size: 12px;
            color: var(--text-muted);
        }

        .news-source a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            background: linear-gradient(135deg, rgba(99,102,241,0.1) 0%, rgba(139,92,246,0.1) 100%);
            color: var(--primary);
            font-size: 11px;
            font-weight: 600;
            border-radius: 20px;
            border: 1px solid rgba(99,102,241,0.2);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .footer {
            text-align: center;
            padding: 32px 20px;
            color: rgba(255,255,255,0.8);
        }

        @media (max-width: 640px) {
            .container { padding: 16px 12px 32px; }
            .stats-grid { gap: 8px; }
            .stat-number { font-size: 22px; }
            .news-title { font-size: 15px; }
            .news-content { margin-left: 40px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="brand">
                <div class="brand-icon">📰</div>
                <span>News Daily</span>
            </div>
            <div class="nav-date">2026-03-15</div>
        </div>
    </nav>

    <div class="container">
        <section class="section">
            <div class="section-header">
                <div class="section-icon">🔥</div>
                <div class="section-title">
                    <h2>全网热度 Top10</h2>
                    <p>互联网科技新闻精选</p>
                </div>
            </div>
            <div class="section-body">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>今日暂无相关报道</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">📱</div>
                <div class="section-title">
                    <h2>社交/直播行业</h2>
                    <p>社交平台与直播动态</p>
                </div>
            </div>
            <div class="section-body">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>今日暂无相关报道</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">🇮🇩</div>
                <div class="section-title">
                    <h2>印尼热点</h2>
                    <p>东南亚市场动态</p>
                </div>
            </div>
            <div class="section-body">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>今日暂无相关报道</div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <div style="font-size: 13px; opacity: 0.7;">K姐 · 每日10:00推送 · 由 OpenClaw 智能生成</div>
    </footer>
</body>
</html>
